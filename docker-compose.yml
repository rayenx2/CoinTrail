
services:
  backend:
    build: ./backend
    container_name: cointrail_backend
    ports:
      - "8060:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=expense_tracker_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - MAIL_USERNAME=noreply@cointrail.local
      - MAIL_PASSWORD=unused
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:5062
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build: ./frontend
    container_name: cointrail_frontend
    ports:
      - "5062:5173"
    environment:
      - VITE_API_URL=http://localhost:8060
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: cointrail_db
    environment:
      POSTGRES_DB: expense_tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5460:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cointrail_redis
    ports:
      - "6360:6379"

volumes:
  postgres_data:
